# Clippy thresholds. Lint levels (clippy::all / pedantic) live in the workspace
# Cargo.toml under [workspace.lints]; this file holds configurable thresholds.
too-many-arguments-threshold = 8

# Finance / LLM / protocol identifiers with embedded capitals (and O(1)) that the
# doc_markdown lint would otherwise flag as un-backticked identifiers. `..` keeps
# clippy's default allowlist.
doc-valid-idents = ["BTC", "ETH", "USDT", "OI", "LLM", "API", "JSON", "HTTP", "URL", "O(1)", "WASM", "ContextSpec", "MarketContext", "OpenAI", "Ollama", ".."]
