# zizmor configuration.
#
# impostor-commit flags `dtolnay/rust-toolchain@<sha>` in the setup-rust
# composite action: zizmor cannot reach the pinned commit from the action's
# default branch because upstream publishes it on a moving tag (`stable`,
# `1.86.0`, …) rather than a branch. The SHA is a genuine upstream commit and
# the pin is the standard, intended way to use that action, so this is a known
# false positive across the workspace. Every other zizmor finding stays active.
rules:
  impostor-commit:
    ignore:
      - action.yml
